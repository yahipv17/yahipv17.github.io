<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard PMMM | Gestión Escolar</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(12px);
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .border-azul {
            border-top-color: #2563EB;
        }

        .border-verde {
            border-top-color: #059669;
        }

        .border-naranja {
            border-top-color: #EA580C;
        }

        .border-gris {
            border-top-color: #475569;
        }

        .sidebar-item.active-azul {
            background: #EFF6FF;
            color: #1D4ED8;
            font-weight: 600;
            border: 1px solid #BFDBFE;
        }

        .sidebar-item.active-verde {
            background: #ECFDF5;
            color: #065F46;
            font-weight: 600;
            border: 1px solid #A7F3D0;
        }

        .sidebar-item.active-naranja {
            background: #FFF7ED;
            color: #C2410C;
            font-weight: 600;
            border: 1px solid #FED7AA;
        }

        .sidebar-item.active-gris {
            background: #F1F5F9;
            color: #1E293B;
            font-weight: 600;
            border: 1px solid #CBD5E1;
        }

        .content-panel {
            animation: fadeIn 0.25s ease-out forwards;
        }
    </style>
</head>

                        freq: 'Anual (se reporta al circuito)',
                        resp: 'Docente Encargado de Brigadas',
                        critical: ['Cada brigada debe integrar: Director/a, Docente, Administrativo, Obrero, Consejo Educativo y MBFAI.', 'La estructura debe incluir los nombres y cédulas de los integrantes.', 'Firmado y sellado por la Dirección.'],
                        alert: 'amber'
                    },
                    {
                        code: '4.3', icon: 'ph-fill ph-users-three',
                        title: 'Listados de Integrantes por Brigada',
                        file: 'BRIGADAS AÑO ESCOLAR 2024-2025 (9).xls PMMM.xls',
                        objective: 'Listados nominales de cada brigada específica: Lectura, Ciencia y Tecnología, Deporte, Salud, Bicentenaria, Culturales (Teatro, Corazón Llanero, Corazón Salsero) y Bricomiles (Educativas Militares Comunitarias).',
                        freq: 'Anual (inicio de año escolar)',
                        resp: 'Docente/a Encargado/a por Brigada',
                        critical: ['Una planilla separada o pestaña por brigada en el libro Excel.', 'Datos mínimos: Nombre, C.I., Cargo/Rol, Turno.', 'Las Brigadas Bricomiles requieren coordinación con el Consejo Comunal.'],
                        alert: 'slate',
                        extras: ['Brigada de Lectura', 'Brigada de Ciencia y Tecnología', 'Brigada de Deporte', 'Brigada de Salud', 'Brigada Bicentenaria', 'Brigada Cultural: Teatro', 'Brigada Cultural: Corazón Llanero', 'Brigada Cultural: Corazón Salsero', 'Brigadas Bricomiles (Comunitarias)']
                    }
                ]
            }
        };

        // =========================================================
        // Modal State
        // =========================================================
        let currentDim = null;
        let currentDoc = 0;

        function openModal(dimKey) {
            currentDim = DIMS[dimKey];
            currentDoc = 0;
            const overlay = document.getElementById('modal-overlay');
            const box = document.getElementById('modal-box');

            // Header
            document.getElementById('modal-header').className = `px-6 py-4 flex justify-between items-center text-white shrink-0 ${currentDim.color}`;
            document.getElementById('modal-icon').className = `text-3xl opacity-80 ${currentDim.icon}`;
            document.getElementById('modal-title').textContent = currentDim.title;
            document.getElementById('modal-subtitle').textContent = currentDim.subtitle;

            // Sidebar
            renderSidebar();
            // Content
            renderContent(0);

            overlay.classList.remove('hidden');
            void overlay.offsetWidth;
            overlay.classList.remove('opacity-0');
            box.classList.remove('scale-95');
            box.classList.add('scale-100');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const overlay = document.getElementById('modal-overlay');
            const box = document.getElementById('modal-box');
            overlay.classList.add('opacity-0');
            box.classList.remove('scale-100');
            box.classList.add('scale-95');
            setTimeout(() => {
                overlay.classList.add('hidden');
                document.body.style.overflow = 'auto';
            }, 300);
        }

        function renderSidebar() {
            const ul = document.getElementById('modal-sidebar');
            ul.innerHTML = '';
            currentDim.docs.forEach((doc, i) => {
                const li = document.createElement('li');
                const btn = document.createElement('button');
                btn.className = `sidebar-item w-full text-left px-3 py-2.5 rounded-lg text-slate-600 hover:bg-slate-100 font-medium text-sm flex items-center gap-2 transition`;
                btn.innerHTML = `<i class="${doc.icon} text-lg shrink-0"></i><span class="truncate">${doc.code} · ${doc.title.split('(')[0].trim()}</span>`;
                btn.id = `sidebar-item-${i}`;
                btn.onclick = () => selectDoc(i);
                if (i === 0) btn.classList.add(currentDim.activeClass);
                li.appendChild(btn);
                ul.appendChild(li);
            });
        }

        function selectDoc(idx) {
            currentDoc = idx;
            // Update sidebar active states
            currentDim.docs.forEach((_, i) => {
                const btn = document.getElementById(`sidebar-item-${i}`);
                btn.className = `sidebar-item w-full text-left px-3 py-2.5 rounded-lg text-slate-600 hover:bg-slate-100 font-medium text-sm flex items-center gap-2 transition`;
                if (i === idx) btn.classList.add(currentDim.activeClass);
            });
            renderContent(idx);
        }

        function renderContent(idx) {
            const doc = currentDim.docs[idx];
            const alertStyles = {
                amber: { bg: 'bg-amber-50 border-amber-200', title: 'text-amber-900', icon: 'ph-fill ph-warning-circle text-amber-500', check: 'text-amber-600', label: 'Elementos Críticos (Auditoría)' },
                red: { bg: 'bg-red-50 border-red-200', title: 'text-red-900', icon: 'ph-fill ph-warning-circle text-red-500', check: 'text-red-500', label: 'Advertencias Legales Importantes' },
                slate: { bg: 'bg-slate-50 border-slate-200', title: 'text-slate-800', icon: 'ph-fill ph-check-circle text-slate-500', check: 'text-slate-500', label: 'Estructura y Requerimientos' }
            };
            const a = alertStyles[doc.alert] || alertStyles.slate;

            let extrasHTML = '';
            if (doc.extras) {
                extrasHTML = `
            <div class="mt-4">
                <h5 class="text-sm font-bold text-slate-900 mb-2 flex items-center gap-1.5"><i class="ph-fill ph-list text-slate-400 text-lg"></i> Brigadas Identificadas</h5>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
                    ${doc.extras.map(e => `<div class="bg-white rounded-lg border border-slate-200 px-3 py-2 text-sm text-slate-700 flex items-center gap-2"><i class="ph-fill ph-shield-checkered text-slate-400"></i>${e}</div>`).join('')}
                </div>
            </div>`;
            }

            document.getElementById('modal-content').innerHTML = `
        <div class="bg-white rounded-xl border border-slate-200 p-6 shadow-sm content-panel">
            <div class="flex flex-col sm:flex-row sm:justify-between sm:items-start gap-4 mb-6">
                <div>
                    <span class="${currentDim.badgeColor} text-[10px] font-extrabold px-2 py-1 rounded uppercase tracking-wider">Ficha Técnica ${doc.code}</span>
                    <h3 class="text-2xl font-bold text-slate-800 mt-2">${doc.title}</h3>
                </div>
                <button onclick="openFile('${doc.file.replace(/'/g, "\\'")}')"
                    class="${currentDim.btnColor} text-white px-4 py-2.5 rounded-xl text-sm font-semibold flex items-center gap-2 transition shadow-sm whitespace-nowrap shrink-0">
                    <i class="ph ph-folder-open text-lg"></i> Abrir Documento
                </button>
            </div>
            <div class="space-y-5">
                <div>
                    <h5 class="text-sm font-bold text-slate-900 flex items-center gap-1.5 mb-1">
                        <i class="ph-fill ph-target text-slate-400 text-lg"></i> Objetivo del Documento
                    </h5>
                    <p class="text-sm text-slate-600 leading-relaxed">${doc.objective}</p>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-slate-50 p-3 rounded-xl border border-slate-100">
                        <h5 class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Frecuencia de Uso</h5>
                        <p class="text-sm font-semibold text-slate-700 mt-0.5">${doc.freq}</p>
                    </div>
                    <div class="bg-slate-50 p-3 rounded-xl border border-slate-100">
                        <h5 class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Responsable</h5>
                        <p class="text-sm font-semibold text-slate-700 mt-0.5">${doc.resp}</p>
                    </div>
                </div>
                <div class="${a.bg} border rounded-xl p-4">
                    <h5 class="text-sm font-bold ${a.title} flex items-center gap-1.5 mb-2">
                        <i class="${a.icon} text-lg"></i> ${a.label}
                    </h5>
                    <ul class="space-y-2 text-sm">
                        ${doc.critical.map(c => `<li class="flex items-start gap-2 ${a.title}"><i class="ph-bold ph-check ${a.check} mt-0.5 shrink-0"></i><span>${c}</span></li>`).join('')}
                    </ul>
                </div>
                <div class="bg-slate-50 border border-slate-200 rounded-xl p-3 flex items-center gap-3">
                    <i class="ph-fill ph-file text-slate-400 text-2xl shrink-0"></i>
                    <div class="min-w-0">
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Archivo en el Portafolio</p>
                        <p class="text-sm font-mono text-slate-600 truncate">${doc.file}</p>
                    </div>
                    <button onclick="openFile('${doc.file.replace(/'/g, "\\'")}')" class="ml-auto shrink-0 text-slate-500 hover:text-slate-900 transition p-1.5 rounded-lg hover:bg-slate-200" title="Abrir archivo">
                        <i class="ph ph-arrow-square-out text-xl"></i>
                    </button>
                </div>
                ${extrasHTML}
            </div>
        </div>`;
        }

        function openFile(filename) {
            // Since both index.html and the files are in the same folder,
            // we can open files relatively. Use window.open with the filename.
            window.open(encodeURIComponent(filename), '_blank');
        }

        // Close on overlay click
        document.getElementById('modal-overlay').addEventListener('click', function (e) {
            if (e.target === this) closeModal();
        });
    </script>
</body>

</html>
